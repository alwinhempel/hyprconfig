################
### MONITORS ###
################


# Macbook Pro Retina
monitor = eDP-1, 2560x1600, 0x0, 1.67

# Macbook Pro 2012
monitor = LVDS-1, 1280x800, 0x0, 1

# Cinema Display 20"
monitor = HDMI-A-2, 1680x1050, auto-up, 1

# Thunderbolt Display 27"
monitor = DP-1, 2560x1440, -500x-1440, 1
monitor = DP-2, preferred, auto-up, 1.5

# Präsi
# monitor = , preferred, auto-up, 1, mirror, eDP-1

# Random Monitor benutzen
monitor = , preferred, auto-up, 1.5





###################
### MY PROGRAMS ###
###################


$terminal = kitty
$fileManager = nautilus
$menu = hyprlauncher





###################
### KEYBINDINGS ###
###################


$mainMod = SUPER 
bind = $mainMod, T, exec, $terminal
bind = CTRL, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, H, togglefloating,
bind = CTRL, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = CTRL, 1, workspace, 1
bind = CTRL, 2, workspace, 2
bind = CTRL, 3, workspace, 3
bind = CTRL, 4, workspace, 4
bind = CTRL, 5, workspace, 5
bind = CTRL, 6, workspace, 6
bind = CTRL, 7, workspace, 7
bind = CTRL, 8, workspace, 8
bind = CTRL, 9, workspace, 9
bind = CTRL, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = CTRL $mainMod, 1, movetoworkspace, 1
bind = CTRL $mainMod, 2, movetoworkspace, 2
bind = CTRL $mainMod, 3, movetoworkspace, 3
bind = CTRL $mainMod, 4, movetoworkspace, 4
bind = CTRL $mainMod, 5, movetoworkspace, 5
bind = CTRL $mainMod, 6, movetoworkspace, 6
bind = CTRL $mainMod, 7, movetoworkspace, 7
bind = CTRL $mainMod, 8, movetoworkspace, 8
bind = CTRL $mainMod, 9, movetoworkspace, 9
bind = CTRL $mainMod, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# custom resize
binde = CTRL $mainMod, up, resizeactive, 0 -40
binde = CTRL $mainMod, down, resizeactive, 0 40
binde = CTRL $mainMod, right, resizeactive, 40 0
binde = CTRL $mainMod, left, resizeactive, -40 0

# screenshot
bind = CTRL+SHIFT, 4, exec, hyprshot -m region --clipboard-only




#####################
### LOOK AND FEEL ###
#####################


general {
    gaps_in = 0
    gaps_out = 0
    border_size = 4

    col.active_border = rgb(a079ff)
	# lila: A079FF
    col.inactive_border = rgb(000000)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 2
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 0
        render_power = 1
        color = rgba(00ffccff)
    }


    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}


misc {
    disable_hyprland_logo = true
    background_color = rgba(000000ff)
}


animations {
     enabled = false
}


dwindle {
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}









#############
### INPUT ###
#############


input {
    kb_layout = de
    kb_variant = nodeadkeys
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

	natural_scroll = true

    touchpad {
        natural_scroll = true
	scroll_factor = 0.2
    	clickfinger_behavior = 1
	}
}

gesture = 3, horizontal, workspace




















#################
### AUTOSTART ###
#################


exec-once = $terminal
exec-once = systemctl --user start hyprpolkitagent
exec-once = waybar
exec-once = zen-browser
exec-once = hyprsunset











#############################
### ENVIRONMENT VARIABLES ###
#############################


env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24













##############################
### WINDOWS AND WORKSPACES ###
##############################


windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}



